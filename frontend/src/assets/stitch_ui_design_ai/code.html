<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "on-primary-fixed": "#ffffff",

                    "inverse-on-surface": "#f0f1f1",
                    "inverse-primary": "#c6c6c6",
                    "outline-variant": "#c6c6c6",
                    "surface-tint": "#5e5e5e",

                    "secondary-container": "#d7d4d3",

                    "on-primary-fixed-variant": "#e2e2e2",
                    "surface-variant": "#e2e2e2",
                    "error-container": "#ffdad6",
                    "secondary-fixed-dim": "#adabaa",
                    "on-background": "#1a1c1c",
                    "on-primary": "#e2e2e2",
                    "inverse-surface": "#2f3131",
                    "on-tertiary": "#e2e2e2",
                    "on-error": "#ffffff",
                    "surface-container-low": "#f3f3f4",
                    "on-tertiary-fixed": "#ffffff",

            "borderRadius": {
                    "DEFAULT": "0px",

                    "body": ["Inter"],
                    "label": ["Inter"]
            }

      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3 {
            font-family: 'Newsreader', serif;
        }
    </style>
</head>
<body class="bg-surface text-on-surface selection:bg-primary selection:text-on-primary min-h-screen flex flex-col">
<!-- TopNavBar Suppressed per UX Goal: Focused Journey (Login) -->
<main class="flex-grow flex items-center justify-center px-6 py-24">
<div class="w-full max-w-md">
<!-- Branding Anchor -->
<div class="mb-16 text-center">
<span class="text-3xl font-black font-headline tracking-tighter text-primary">Blinky</span>
</div>
<!-- Login Container (Architectural Void) -->
<div class="bg-surface-container-lowest p-12 md:p-16 shadow-[0_20px_50px_rgba(0,0,0,0.04)]">
<header class="mb-12">
<h1 class="text-5xl md:text-6xl font-headline tracking-tighter leading-tight text-primary italic">
                        Welcome back.
                    </h1>
<p class="mt-4 text-secondary font-body tracking-tight text-sm">
                        Continue to the intelligence dashboard.
                    </p>
</header>
<form class="space-y-10" onsubmit="return false;">
<!-- Email Field -->
<div class="group">
<label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-secondary mb-2 transition-colors group-focus-within:text-primary" for="email">
                            Email Address
                        </label>
<input class="w-full bg-transparent border-b border-outline outline-none py-3 px-0 font-body text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-0 transition-all duration-300" id="email" placeholder="name@example.com" type="email"/>
</div>
<!-- Password Field -->
<div class="group">
<div class="flex justify-between items-end mb-2">
<label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-secondary transition-colors group-focus-within:text-primary" for="password">
                                Password
                            </label>
<a class="text-[10px] uppercase tracking-widest text-secondary hover:text-primary transition-colors hover:underline" href="#">
                                Forgot password?
                            </a>
</div>
<input class="w-full bg-transparent border-b border-outline outline-none py-3 px-0 font-body text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-0 transition-all duration-300" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Primary Action -->
<div class="pt-6">
<button class="w-full bg-primary text-on-primary font-label font-bold py-5 text-sm tracking-widest uppercase hover:bg-tertiary transition-all duration-300 active:scale-[0.98]">
                            Sign In
                        </button>
</div>
</form>
<!-- Footnote Links -->
<div class="mt-12 text-center">
<p class="text-xs font-body text-secondary tracking-tight">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline ml-1" href="#">Create account</a>
</p>
</div>
</div>
<!-- Background Decorative Element (Abstract / Editorial) -->
<div class="mt-12 flex justify-center gap-2 opacity-10">
<div class="h-1 w-12 bg-primary"></div>
<div class="h-1 w-1 bg-primary"></div>
<div class="h-1 w-1 bg-primary"></div>
</div>
</div>
</main>
<!-- Footer - Contextual Suppression (Simplified version for Login) -->
<footer class="w-full py-12 bg-surface">
<div class="max-w-screen-2xl mx-auto px-12 flex flex-col md:flex-row justify-between items-center gap-6 opacity-60">
<span class="font-headline font-bold text-black text-lg tracking-tighter">Blinky</span>
<div class="flex gap-8">
<a class="font-body text-[10px] uppercase tracking-widest text-zinc-500 hover:text-black transition-all" href="#">Terms</a>
<a class="font-body text-[10px] uppercase tracking-widest text-zinc-500 hover:text-black transition-all" href="#">Privacy</a>
</div>
<p class="font-body text-[10px] uppercase tracking-widest text-zinc-400">
                © 2024 Blinky Intelligence.
            </p>
</div>
</footer>
<!-- Abstract Minimalist Background Image (Overlayed subtle noise or texture if required) -->
<div class="fixed inset-0 pointer-events-none -z-10 bg-surface">
<div class="absolute inset-0 opacity-[0.03]" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDd4rEPl14HGE9iYc65v-TxCN4v19UJMbJ8Ig2yzb4ATlmNYTiHlq6NAX75rI877o2zACqcqbWTfSehMWOIbvJt4RPRkDIgKsgcVfts9gRAFnPpzQsDWXU04J29P5V6SyoqsFVza3jidRQWLzGyPtwgLfev_BiEj4oVAQAsFt-k5G8tXZg9TRTS5EKokM3_6_4WYhQ6r3s_Zvc6K4GkHTcZe26gqCHLJEBt86rM6zDgCSt64AUC09l1XzSLQedD1w9L3v8gWzSMGi9e')"></div>
<div class="absolute top-0 right-0 w-1/3 h-full bg-surface-container-low -skew-x-12 transform translate-x-1/2"></div>
</div>
</body></html>
